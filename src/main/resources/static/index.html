<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h4">Personas</span>
            <div class="d-flex gap-2 align-items-center">
                <span id="cacheStatus" class="badge">Cache: 0</span>
                <button class="btn btn-outline-light btn-sm" onclick="clearCache()">Limpiar</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <!-- Alerts -->
        <div id="alertContainer"></div>

        <!-- Search Section -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Búsqueda</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="searchLastName" class="form-control" 
                               placeholder="Buscar por apellido...">
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-primary w-100" onclick="searchByLastName()">
                            Buscar
                        </button>
                    </div>
                </div>
                <hr class="my-3">
                <button class="btn btn-secondary btn-sm" onclick="loadAllPeople()">
                    Ver todas
                </button>
            </div>
        </div>

        <!-- Add Person Section -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Nueva Persona</h5>
            </div>
            <div class="card-body">
                <form id="personForm" onsubmit="addPerson(event)">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="firstName" 
                                   placeholder="Juan" required>
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="lastName" 
                                   placeholder="García" required>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">
                            Limpiar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- People Table Section -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Listado de Personas</h5>
                <span id="tableCount" class="badge">0</span>
            </div>
            <div class="card-body p-0">
                <div id="tableContainer" class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th style="width: 10%;">ID</th>
                                <th style="width: 35%;">Nombre</th>
                                <th style="width: 35%;">Apellido</th>
                                <th style="width: 20%;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="peopleTable">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">
                                    Cargando datos...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Persona</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <div class="mb-3">
                            <label for="editFirstName" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="editFirstName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editLastName" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="editLastName" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">
                        Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
